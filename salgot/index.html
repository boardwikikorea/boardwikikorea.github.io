<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>살곶이팀 (TEAM SALGOT)</title>

  <!-- SEO -->
  <meta name="description" content="살곶이팀 롱보드팀, salgotlongboard, teamsalgot" />
  <meta name="keywords" content="롱보드, 팀 살곶이, salgotlongboard, teamsalgot" />
  <meta name="naver-site-verification" content="e74dc3e49d0527046508b26ee9860c52a501b8f4" />

  <!-- OG -->
  <meta property="og:site_name" content="TEAM SALGOT" />
  <meta property="og:title" content="살곶이팀 (TEAM SALGOT)" />
  <meta property="og:description" content="KOREA LONGBOARD TEAM" />
  <meta property="og:url" content="https://boardwiki.kr" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://boardwiki.kr/salgot/img/salgot.png?ver=20260122" />

  <!-- Fonts -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />

  <!-- Tailwind v4 -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <!-- Hero Animations -->
  <style>
    @keyframes heroFadeUp {
      0% {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .hero-animate {
      animation: heroFadeUp 1.2s ease-out both;
    }
    .hero-delay-1 {
      animation-delay: 0.15s;
    }
    .hero-delay-2 {
      animation-delay: 0.3s;
    }
    .hero-delay-3 {
      animation-delay: 0.45s;
    }
    :root {
      --mist-shift-x: 0px;
      --mist-shift-y: 0px;
    }

    .site-shell {
      position: relative;
      z-index: 2;
    }

    .section-block {
      position: relative;
      padding-top: clamp(5.5rem, 10vw, 7.5rem);
      padding-bottom: clamp(5.5rem, 10vw, 7.5rem);
    }

    .section-block + .section-block {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .section-activities {
      background: linear-gradient(180deg, rgba(26, 26, 26, 0.94), rgba(14, 14, 14, 0.97));
    }

    .section-cta {
      background: linear-gradient(180deg, rgba(11, 11, 11, 0.95), rgba(6, 6, 6, 0.98));
    }

    .section-members {
      background: linear-gradient(180deg, rgba(21, 21, 21, 0.96), rgba(10, 10, 10, 0.98));
    }

    .section-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(9, 9, 9, 0.9);
    }

    .mist-wrap {
      position: fixed;
      inset: -12vh -10vw;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .mist-layer,
    .mist-cursor {
      position: absolute;
      border-radius: 999px;
      filter: blur(70px);
      will-change: transform, opacity;
    }

    .mist-layer-a {
      width: 52vw;
      height: 48vh;
      top: -10vh;
      left: -8vw;
      opacity: 0.35;
      background: radial-gradient(
        circle at 30% 45%,
        rgba(217, 227, 240, 0.2),
        rgba(125, 143, 166, 0.02) 72%
      );
      animation: mistDriftA 20s ease-in-out infinite alternate;
    }

    .mist-layer-b {
      width: 58vw;
      height: 52vh;
      right: -12vw;
      bottom: -14vh;
      opacity: 0.28;
      background: radial-gradient(
        circle at 60% 35%,
        rgba(190, 206, 232, 0.15),
        rgba(117, 129, 149, 0.02) 70%
      );
      animation: mistDriftB 24s ease-in-out infinite alternate;
    }

    .mist-cursor {
      width: clamp(180px, 20vw, 300px);
      height: clamp(180px, 20vw, 300px);
      left: 50%;
      top: 50%;
      transform: translate3d(-50%, -50%, 0);
      opacity: 0.7;
      background: radial-gradient(
        circle,
        rgba(226, 236, 252, 0.18) 0%,
        rgba(175, 196, 226, 0.06) 42%,
        rgba(115, 130, 151, 0) 72%
      );
      animation: mistPulse 5.4s ease-in-out infinite;
    }

    .content-reveal {
      opacity: 0;
      transform: translate3d(0, 26px, 0) scale(0.98);
      filter: blur(5px);
      transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.85s ease, filter 0.9s ease;
      transition-delay: calc(var(--reveal-delay, 0) * 85ms);
      will-change: transform, opacity, filter;
    }

    .content-reveal[data-reveal='title'] {
      transform: translate3d(0, 20px, 0);
    }

    .content-reveal[data-reveal='block'] {
      transform: translate3d(0, 28px, 0) scale(0.985);
    }

    .content-reveal[data-reveal='cta'] {
      transform: translate3d(0, 20px, 0) scale(0.98);
    }

    .content-reveal[data-reveal='member'] {
      transform: translate3d(0, 34px, 0) scale(0.97);
    }

    .content-reveal.is-visible {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
      filter: blur(0);
    }

    #activitySlides .swiper-slide {
      transition: transform 0.55s ease, opacity 0.55s ease;
    }

    #activitySlides .swiper-slide.is-current {
      transform: translateY(-4px) scale(1.01);
      opacity: 1;
    }

    #teamStatsGrid {
      perspective: 1200px;
      margin-bottom: clamp(1.15rem, 3vw, 2rem);
    }

    .team-stat-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 1rem;
      padding: 1rem 1.1rem;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
      backdrop-filter: blur(3px);
      transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .team-stat-card::after {
      content: "";
      position: absolute;
      inset: -1px;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0));
      opacity: 0.3;
      pointer-events: none;
    }

    .team-stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.35);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }

    .team-stat-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: rgba(229, 229, 229, 0.72);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .team-stat-number {
      font-size: clamp(1.7rem, 2.4vw, 2.4rem);
      font-weight: 800;
      line-height: 1;
      color: #fff;
      margin-bottom: 0.55rem;
    }

    .team-stat-label {
      font-size: 0.82rem;
      color: rgba(229, 229, 229, 0.76);
      letter-spacing: 0.02em;
    }

    .section-activities #activityTitle {
      margin-bottom: clamp(2rem, 4vw, 3rem);
    }

    .section-cta #ctaTitle {
      margin-bottom: clamp(1.4rem, 3vw, 2.1rem);
    }

    .section-members #membersTitle {
      margin-bottom: clamp(2.2rem, 4vw, 4rem);
    }

    .mySwiper {
      overflow: visible;
      padding-bottom: 3.4rem;
    }

    #activitySlides .swiper-slide {
      display: flex;
      height: auto;
      opacity: 0.55;
      transform: translateY(8px) scale(0.94);
    }

    .activity-card {
      width: 100%;
      border-radius: 1rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.26);
      transition: transform 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;
    }

    .activity-media {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .activity-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.38), rgba(0, 0, 0, 0));
      pointer-events: none;
    }

    .activity-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transform: scale(1.02);
      transition: transform 0.8s ease;
    }

    .activity-caption {
      padding: 0.95rem 1.05rem 1.15rem;
      font-size: 0.92rem;
      line-height: 1.55;
      color: rgb(212, 212, 212);
      text-align: left;
    }

    #activitySlides .swiper-slide.is-current {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    #activitySlides .swiper-slide.is-current .activity-card {
      border-color: rgba(255, 255, 255, 0.34);
      transform: translateY(-2px);
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.42);
    }

    #activitySlides .swiper-slide.is-current .activity-image {
      transform: scale(1.07);
    }

    #activitySlides .swiper-slide:not(.is-current) .activity-card {
      filter: saturate(0.75);
    }

    .mySwiper .swiper-pagination-bullet {
      width: 10px;
      height: 10px;
      background: rgba(255, 255, 255, 0.36);
      opacity: 1;
      transition: width 0.25s ease, background-color 0.25s ease;
    }

    .mySwiper .swiper-pagination-bullet-active {
      width: 28px;
      border-radius: 999px;
      background: #fff;
    }

    .mySwiper .swiper-button-prev,
    .mySwiper .swiper-button-next {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(15, 15, 15, 0.65);
      backdrop-filter: blur(4px);
      color: #fff;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .mySwiper .swiper-button-prev:hover,
    .mySwiper .swiper-button-next:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .mySwiper .swiper-button-prev::after,
    .mySwiper .swiper-button-next::after {
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 767px) {
      .mySwiper .swiper-button-prev,
      .mySwiper .swiper-button-next {
        display: none;
      }
    }

    #activitySlides .swiper-slide:not(.is-current) {
      opacity: 0.72;
    }

    .cta-float {
      animation: ctaFloat 4.8s ease-in-out infinite;
    }

    @keyframes mistDriftA {
      0% {
        transform: translate3d(
            calc(var(--mist-shift-x) * -0.4),
            calc(var(--mist-shift-y) * -0.4),
            0
          )
          scale(1);
      }
      50% {
        transform: translate3d(
            calc(var(--mist-shift-x) * -0.55 + 2vw),
            calc(var(--mist-shift-y) * -0.5 - 2vh),
            0
          )
          scale(1.08);
      }
      100% {
        transform: translate3d(
            calc(var(--mist-shift-x) * -0.45 - 1vw),
            calc(var(--mist-shift-y) * -0.45 + 2vh),
            0
          )
          scale(1.03);
      }
    }

    @keyframes mistDriftB {
      0% {
        transform: translate3d(
            calc(var(--mist-shift-x) * 0.35),
            calc(var(--mist-shift-y) * 0.35),
            0
          )
          scale(1.04);
      }
      50% {
        transform: translate3d(
            calc(var(--mist-shift-x) * 0.48 - 2vw),
            calc(var(--mist-shift-y) * 0.42 + 1vh),
            0
          )
          scale(1.12);
      }
      100% {
        transform: translate3d(
            calc(var(--mist-shift-x) * 0.4 + 1vw),
            calc(var(--mist-shift-y) * 0.4 - 2vh),
            0
          )
          scale(1.06);
      }
    }

    @keyframes mistPulse {
      0%,
      100% {
        opacity: 0.55;
        filter: blur(62px);
      }
      50% {
        opacity: 0.8;
        filter: blur(76px);
      }
    }

    @keyframes ctaFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .mist-layer,
      .mist-cursor,
      .cta-float {
        animation: none !important;
      }

      .content-reveal {
        opacity: 1;
        transform: none;
        filter: none;
        transition: none;
      }

      #activitySlides .swiper-slide,
      #activitySlides .swiper-slide.is-current,
      #activitySlides .swiper-slide:not(.is-current) {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body class="bg-neutral-950 text-neutral-100 font-['Pretendard']">
  <h1 id="pageTitle" class="sr-only">롱보드 팀 살곶이</h1>
  <div class="mist-wrap" aria-hidden="true">
    <div class="mist-layer mist-layer-a"></div>
    <div class="mist-layer mist-layer-b"></div>

  </div>

  <div class="site-shell">

  <div class="fixed top-4 right-4 z-50">
    <div class="inline-flex rounded-full border border-neutral-700 bg-neutral-900/80 p-1 backdrop-blur">
      <button
        id="langKoBtn"

        type="button"

      >

      </button>

  <!-- ================= HERO ================= -->
  <section

  <!-- Scroll Indicator -->
  <div id="scrollText" class="absolute bottom-6 left-1/2 -translate-x-1/2 text-neutral-500 text-xs tracking-widest">

  </div>

  <!-- ================= ACTIVITIES ================= -->
  <section class="section-block section-activities">
    <div class="max-w-6xl mx-auto px-6 mb-10">
      <ul id="teamStatsGrid" class="grid gap-4 md:grid-cols-3"></ul>
    </div>

    <h2 id="activityTitle" class="text-2xl md:text-3xl font-bold text-center mb-12"></h2>

    <div class="max-w-5xl mx-auto px-6">

        <div class="swiper-wrapper" id="activitySlides"></div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

  </section>

  <!-- ================= CTA ================= -->
  <section class="section-block section-cta text-center">

  <!-- ================= MEMBERS ================= -->
  <section class="section-block section-members">
    <h2 id="membersTitle" class="text-2xl md:text-3xl font-bold text-center mb-16"></h2>

      <ul id="memberGrid" class="grid gap-10 md:grid-cols-2 lg:grid-cols-3"></ul>
    </div>
  </section>

  <!-- ================= FOOTER ================= -->
  <footer class="section-footer py-10 text-center text-sm text-neutral-500">
    <a href="https://www.instagram.com/salgot.longboard/" target="_blank" class="hover:text-white">
      Instagram @salgot.longboard
    </a>
    <span class="mx-2">|</span>
    <a href="../" class="hover:text-white" id="footerBoardwiki"></a>
  </footer>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    const LANGUAGE_STORAGE_KEY = 'salgot_lang';
    const I18N = {
      ko: {
        htmlLang: 'ko',
        pageTitle: '롱보드 팀 살곶이',
        ctaTitle: '살곶이팀의 다양한 영상과 소식을 보고 싶으신가요?',
        ctaButton: '인스타그램 바로가기',
        membersTitle: '살곶이팀 멤버',
        footerBoardwiki: '서비스 BOARDWIKI',
        nationalityLabel: '국적',
        instagramLabel: 'Instagram 바로가기',
        introJson: './json/intro.json',
        activitiesJson: './json/activities.json',
        membersJson: './json/members.json'
      },
      en: {
        htmlLang: 'en',
        pageTitle: 'TEAM SALGOT Longboard Team',
        ctaTitle: 'Want to see TEAM SALGOT videos and latest updates?',
        ctaButton: 'Visit Instagram',
        membersTitle: 'TEAM SALGOT Members',
        footerBoardwiki: 'Powered by BOARDWIKI',
        nationalityLabel: 'Nationality',
        instagramLabel: 'Visit Instagram',
        introJson: './json/intro.en.json',
        activitiesJson: './json/activities.en.json',
        membersJson: './json/members.en.json'
      }
    };

    let currentLang = localStorage.getItem(LANGUAGE_STORAGE_KEY);
    if (!I18N[currentLang]) {
      currentLang = 'ko';
    }

    let swiperInstance = null;
    let revealObserver = null;
    let fogRafId = null;

    function ensureRevealObserver() {
      if (revealObserver || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        return;
      }

      revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              revealObserver.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.2, rootMargin: '0px 0px -8% 0px' }
      );
    }

    function revealElement(el, type = 'block', delay = 0) {
      if (!el) {
        return;
      }

      if (!el.classList.contains('content-reveal')) {
        el.classList.add('content-reveal');
      }

      el.dataset.reveal = type;
      el.style.setProperty('--reveal-delay', String(delay));

      if (el.classList.contains('is-visible')) {
        return;
      }

      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        el.classList.add('is-visible');
        return;
      }

      ensureRevealObserver();
      if (revealObserver) {
        revealObserver.observe(el);
      } else {
        el.classList.add('is-visible');
      }
    }

    function updateActivitySlideState() {
      document.querySelectorAll('#activitySlides .swiper-slide').forEach((slide) => {
        const isCurrent =
          slide.classList.contains('swiper-slide-active') || slide.classList.contains('swiper-slide-duplicate-active');
        slide.classList.toggle('is-current', isCurrent);
      });
    }

    function getTeamStatLabels(lang) {
      if (lang === 'ko') {
        return {
          total: '\uCD1D \uD300\uC6D0\uC218',
          domestic: '\uAD6D\uB0B4 \uD300\uC6D0\uC218',
          overseas: '\uD574\uC678 \uD300\uC6D0\uC218'
        };
      }

      return {
        total: 'Total Members',
        domestic: 'Domestic Members',
        overseas: 'Overseas Members'
      };
    }

    function isDomesticMember(member) {
      const nationality = String(member?.nationality || '').toLowerCase();
      return nationality.includes('\uB300\uD55C\uBBFC\uAD6D') || nationality.includes('korea');
    }

    function renderTeamStats(lang, membersData) {
      const grid = document.getElementById('teamStatsGrid');
      if (!grid) {
        return;
      }

      const labels = getTeamStatLabels(lang);
      const total = membersData.length;
      const domestic = membersData.filter(isDomesticMember).length;
      const overseas = Math.max(0, total - domestic);

      const stats = [
        { label: labels.total, value: total },
        { label: labels.domestic, value: domestic },
        { label: labels.overseas, value: overseas }
      ];

      grid.innerHTML = stats
        .map(
          (stat) => `
            <li class="team-stat-card">
              <p class="team-stat-eyebrow">TEAM SALGOT</p>
              <p class="team-stat-number">${stat.value}</p>
              <p class="team-stat-label">${stat.label}</p>
            </li>
          `
        )
        .join('');
    }
    function setupSectionAnimations() {
      revealElement(document.getElementById('teamStatsGrid'), 'block', 0);
      revealElement(document.getElementById('activityTitle'), 'title', 1);
      revealElement(document.querySelector('.mySwiper'), 'block', 2);
      revealElement(document.getElementById('ctaTitle'), 'title', 0);
      revealElement(document.getElementById('ctaButton'), 'cta', 1);
      revealElement(document.getElementById('membersTitle'), 'title', 0);

      document.querySelectorAll('#teamStatsGrid > li').forEach((card, index) => {
        revealElement(card, 'block', index);
      });

      const ctaButton = document.getElementById('ctaButton');
      if (ctaButton) {
        ctaButton.classList.add('cta-float');
      }

      document.querySelectorAll('#activitySlides .swiper-slide').forEach((slide, index) => {
        revealElement(slide, 'block', index % 4);
      });

      document.querySelectorAll('#memberGrid > li').forEach((card, index) => {
        revealElement(card, 'member', index % 6);
      });
    }

    function setupFogCursor() {
      const cursor = document.getElementById('mistCursor');
      if (!cursor) {
        return;
      }

      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        cursor.style.opacity = '0.35';
        return;
      }

      let targetX = window.innerWidth / 2;
      let targetY = window.innerHeight / 2;
      let currentX = targetX;
      let currentY = targetY;

      const updateMistShift = (x, y) => {
        const shiftX = (x / window.innerWidth - 0.5) * 34;
        const shiftY = (y / window.innerHeight - 0.5) * 28;
        document.documentElement.style.setProperty('--mist-shift-x', `${shiftX.toFixed(2)}px`);
        document.documentElement.style.setProperty('--mist-shift-y', `${shiftY.toFixed(2)}px`);
      };

      const onPointerMove = (event) => {
        targetX = event.clientX;
        targetY = event.clientY;
        updateMistShift(targetX, targetY);
      };

      const onPointerLeave = () => {
        targetX = window.innerWidth / 2;
        targetY = window.innerHeight / 2;
        document.documentElement.style.setProperty('--mist-shift-x', '0px');
        document.documentElement.style.setProperty('--mist-shift-y', '0px');
      };

      const onResize = () => {
        if (targetX > window.innerWidth || targetY > window.innerHeight) {
          onPointerLeave();
        }
      };

      const animateFog = () => {
        currentX += (targetX - currentX) * 0.09;
        currentY += (targetY - currentY) * 0.09;
        cursor.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) translate(-50%, -50%)`;
        fogRafId = requestAnimationFrame(animateFog);
      };

      window.addEventListener('pointermove', onPointerMove, { passive: true });
      window.addEventListener('pointerleave', onPointerLeave, { passive: true });
      window.addEventListener('blur', onPointerLeave);
      window.addEventListener('resize', onResize);

      if (fogRafId) {
        cancelAnimationFrame(fogRafId);
      }
      animateFog();
    }

    function setLanguageButtons(lang) {
      const koBtn = document.getElementById('langKoBtn');
      const enBtn = document.getElementById('langEnBtn');

      const activeClasses = ['bg-white', 'text-black'];
      const inactiveClasses = ['text-neutral-300', 'hover:text-white'];

      [koBtn, enBtn].forEach((btn) => {
        btn.classList.remove(...activeClasses, ...inactiveClasses);
      });

      if (lang === 'ko') {
        koBtn.classList.add(...activeClasses);
        enBtn.classList.add(...inactiveClasses);
        koBtn.setAttribute('aria-pressed', 'true');
        enBtn.setAttribute('aria-pressed', 'false');
      } else {
        enBtn.classList.add(...activeClasses);
        koBtn.classList.add(...inactiveClasses);
        koBtn.setAttribute('aria-pressed', 'false');
        enBtn.setAttribute('aria-pressed', 'true');
      }
    }

    function renderStaticTexts(lang) {
      const t = I18N[lang];
      document.documentElement.lang = t.htmlLang;
      document.getElementById('pageTitle').textContent = t.pageTitle;
      document.getElementById('ctaTitle').textContent = t.ctaTitle;
      document.getElementById('ctaButton').textContent = t.ctaButton;
      document.getElementById('membersTitle').textContent = t.membersTitle;
      document.getElementById('footerBoardwiki').textContent = t.footerBoardwiki;
      document.title = lang === 'ko' ? '살곶이팀 (TEAM SALGOT)' : 'TEAM SALGOT';
    }

    async function renderIntro(lang) {
      const t = I18N[lang];
      const d = await fetch(t.introJson).then((r) => r.json());

      document.getElementById('introSection').innerHTML = `
        <div class="absolute inset-0 bg-gradient-to-b from-neutral-900/70 via-neutral-950 to-neutral-950"></div>

        <div class="relative z-10 max-w-5xl mx-auto">
          <img
            src="${d.image.src}"
            alt="${d.image.alt}"
            class="hero-animate hero-delay-1 mx-auto mb-10 w-80 sm:w-96 md:w-[28rem] drop-shadow-[0_20px_40px_rgba(0,0,0,0.6)]"
          />

          <h2 class="hero-animate hero-delay-2 text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight">
            ${d.title.text}
          </h2>

          <div class="hero-animate hero-delay-2 mx-auto my-8 h-px w-24 bg-neutral-600"></div>

          <p class="hero-animate hero-delay-3 mx-auto max-w-2xl text-base sm:text-lg md:text-xl text-neutral-300 leading-relaxed">
            ${d.description.text.replace(/\n/g, '<br>')}
          </p>
        </div>
      `;
    }

    async function renderActivities(lang) {
      const t = I18N[lang];
      const d = await fetch(t.activitiesJson).then((r) => r.json());

      document.getElementById('activityTitle').textContent = d.title.text;

      const wrap = document.getElementById('activitySlides');
      wrap.innerHTML = '';
      d.slides.forEach((s) => {
        wrap.innerHTML += `
          <div class="swiper-slide">
            <article class="activity-card">
              <div class="activity-media">
                <img src="${s.image}" class="activity-image" alt="${s.caption}" />
              </div>
              <p class="activity-caption">${s.caption}</p>
            </article>
          </div>
        `;
      });

      if (swiperInstance) {
        swiperInstance.destroy(true, true);
      }
      swiperInstance = new Swiper('.mySwiper', {
        loop: d.swiper.loop,
        centeredSlides: d.swiper.centered,
        slidesPerView: 1.15,
        spaceBetween: 16,
        speed: 850,
        grabCursor: true,
        watchSlidesProgress: true,
        autoplay: {
          delay: Math.max(d.swiper.autoplayDelay, 2000),
          disableOnInteraction: false,
          pauseOnMouseEnter: true
        },
        breakpoints: {
          640: { slidesPerView: 1.35, spaceBetween: 20 },
          1024: { slidesPerView: 1.75, spaceBetween: 24 },
          1280: { slidesPerView: 2.05, spaceBetween: 28 }
        },
        pagination: { el: '.swiper-pagination', clickable: true },
        navigation: {
          nextEl: '.swiper-button-next',
          prevEl: '.swiper-button-prev'
        }
      });

      swiperInstance.on('slideChangeTransitionEnd', updateActivitySlideState);
      updateActivitySlideState();
    }

    function renderMembers(lang, membersData) {
      const t = I18N[lang];
      const grid = document.getElementById('memberGrid');
      grid.innerHTML = '';

      membersData.forEach((m) => {
        grid.innerHTML += `
          <li class="relative rounded-2xl border border-neutral-800 p-6 pt-11 bg-neutral-950/60 hover:-translate-y-1 hover:shadow-xl hover:shadow-black/40 hover:border-neutral-500 transition-all duration-300">
            ${
              m.role
                ? `<span class="absolute right-4 top-4 rounded-full border border-neutral-600 bg-neutral-900/80 px-2.5 py-1 text-[11px] font-semibold tracking-wide text-neutral-100">${m.role}</span>`
                : ''
            }
            <h3 class="text-xl font-bold">${m.name}</h3>
            <p class="text-sm text-neutral-400 mt-1">${m.note || ''}</p>
            <p class="text-xs text-neutral-500 mt-2">${t.nationalityLabel}: ${m.nationality || '-'}</p>

            ${
              m.instagram
                ? `<a href="${m.instagram}" target="_blank" class="inline-block mt-3 text-sm text-neutral-400 hover:text-white">${t.instagramLabel}</a>`
                : ''
            }

            <ul class="mt-4 space-y-1 text-sm text-neutral-300 list-disc list-inside">
              ${m.career.map((c) => `<li>${c}</li>`).join('')}
            </ul>
          </li>
        `;
      });
    }

    async function switchLanguage(lang) {
      if (!I18N[lang]) {
        return;
      }

      currentLang = lang;
      localStorage.setItem(LANGUAGE_STORAGE_KEY, lang);

      setLanguageButtons(lang);
      renderStaticTexts(lang);

      const t = I18N[lang];
      const [, , membersData] = await Promise.all([
        renderIntro(lang),
        renderActivities(lang),
        fetch(t.membersJson).then((r) => r.json())
      ]);
      renderTeamStats(lang, membersData);
      renderMembers(lang, membersData);
      setupSectionAnimations();
      updateActivitySlideState();
    }

    async function init() {
      document.getElementById('langKoBtn').addEventListener('click', () => switchLanguage('ko'));
      document.getElementById('langEnBtn').addEventListener('click', () => switchLanguage('en'));

      setupFogCursor();
      await switchLanguage(currentLang);
    }

    init().catch((err) => {
      console.error('Failed to initialize salgot page:', err);
    });
  </script>
</body>
</html>
